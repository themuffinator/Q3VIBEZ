name: build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  windows-clangcl:
    name: ${{ matrix.buildtype }} Windows clang-cl x64
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        buildtype: [debug, release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Add LLVM to PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value 'C:\Program Files\LLVM\bin'

      - name: Install Meson and Ninja
        shell: pwsh
        run: py -3 -m pip install --upgrade meson ninja

      - name: Generate Meson source manifests
        shell: pwsh
        run: python scripts\generate_meson_source_lists.py

      - name: Configure
        shell: pwsh
        run: meson setup "build\windows-clangcl-${{ matrix.buildtype }}" --native-file toolchains\windows-clangcl.ini --buildtype ${{ matrix.buildtype }}

      - name: Build
        shell: pwsh
        run: meson compile -C "build\windows-clangcl-${{ matrix.buildtype }}"

      - uses: actions/upload-artifact@v4
        if: matrix.buildtype == 'release'
        with:
          name: windows-clangcl-x64
          path: |
            build/windows-clangcl-release/*.exe
            build/windows-clangcl-release/*.dll
          if-no-files-found: error
          retention-days: 5

  linux-gcc:
    name: ${{ matrix.buildtype }} Linux gcc x64
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        buildtype: [debug, release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev libgl1-mesa-dev libsdl3-dev

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Generate Meson source manifests
        run: python scripts/generate_meson_source_lists.py

      - name: Configure
        run: meson setup "build/linux-${{ matrix.buildtype }}" --buildtype "${{ matrix.buildtype }}"

      - name: Build
        run: meson compile -C "build/linux-${{ matrix.buildtype }}"

      - uses: actions/upload-artifact@v4
        if: matrix.buildtype == 'release'
        with:
          name: linux-gcc-x64
          path: |
            build/linux-release/quake3e.x64
            build/linux-release/quake3e.ded.x64
            build/linux-release/*.so
          if-no-files-found: error
          retention-days: 5

  macos-clang:
    name: ${{ matrix.buildtype }} macOS clang ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
            buildtype: debug
          - runner: macos-13
            arch: x86_64
            buildtype: release
          - runner: macos-14
            arch: aarch64
            buildtype: debug
          - runner: macos-14
            arch: aarch64
            buildtype: release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Homebrew dependencies
        run: brew install pkg-config sdl3 curl

      - name: Expose Homebrew pkg-config paths
        run: |
          BREW_PREFIX="$(brew --prefix)"
          echo "PKG_CONFIG_PATH=$BREW_PREFIX/opt/curl/lib/pkgconfig:$BREW_PREFIX/opt/sdl3/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Generate Meson source manifests
        run: python scripts/generate_meson_source_lists.py

      - name: Configure
        run: meson setup "build/macos-${{ matrix.arch }}-${{ matrix.buildtype }}" --buildtype "${{ matrix.buildtype }}"

      - name: Build
        run: meson compile -C "build/macos-${{ matrix.arch }}-${{ matrix.buildtype }}"

      - uses: actions/upload-artifact@v4
        if: matrix.buildtype == 'release'
        with:
          name: macos-clang-${{ matrix.arch }}
          path: |
            build/macos-${{ matrix.arch }}-release/quake3e.${{ matrix.arch }}
            build/macos-${{ matrix.arch }}-release/quake3e.ded.${{ matrix.arch }}
            build/macos-${{ matrix.arch }}-release/*.dylib
          if-no-files-found: error
          retention-days: 5
